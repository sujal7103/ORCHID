###############################################################################
# Orchid — standalone docker-compose
# Quick start:
#   cp .env.example .env     # fill in JWT_SECRET + ENCRYPTION_MASTER_KEY
#   docker compose up -d
#   open http://localhost:3000
###############################################################################

services:

  # ── Frontend (Vite → nginx) ────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3001}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    container_name: orchid-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    networks:
      - orchid

  # ── Backend (Go / Fiber) ───────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orchid-backend
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/orchid
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=mysql://${MYSQL_USER:-clara}:${MYSQL_PASSWORD:-clarapassword}@mysql:3306/${MYSQL_DATABASE:-orchid}?parseTime=true
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRY=${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      - JWT_REFRESH_TOKEN_EXPIRY=${JWT_REFRESH_TOKEN_EXPIRY:-168h}
      - ENCRYPTION_MASTER_KEY=${ENCRYPTION_MASTER_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:3001}
      - UPLOAD_DIR=/app/uploads
      # Optional integrations
      - SEARXNG_URL=${SEARXNG_URL:-}
      - E2B_API_KEY=${E2B_API_KEY:-}
      - COMPOSIO_API_KEY=${COMPOSIO_API_KEY:-}
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - orchid

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: orchid-mongodb
    volumes:
      - mongodb-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=orchid
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - orchid

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: orchid-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5
    networks:
      - orchid

  # ── MySQL (providers, models, schema) ─────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: orchid-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-orchid}
      MYSQL_USER: ${MYSQL_USER:-clara}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clarapassword}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - orchid

volumes:
  mongodb-data:
  redis-data:
  mysql-data:
  backend-uploads:
  backend-logs:

networks:
  orchid:
    driver: bridge
